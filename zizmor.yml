rules:
  unpinned-uses:
    config:
      policies:
        "*": ref-pin
  # dist.yml is generated by cargo-dist; its findings belong upstream and would
  # be lost on regeneration, so they are ignored here rather than patched.
  template-injection:
    ignore:
      - dist.yml
  unpinned-images:
    ignore:
      - dist.yml
  excessive-permissions:
    ignore:
      - dist.yml
