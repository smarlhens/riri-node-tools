[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
edition = "2024"
authors = ["Samuel MARLHENS <samuel.marlhens@proton.me>"]
license = "BlueOak-1.0.0"

[workspace.lints.clippy]
pedantic = "deny"
dbg_macro = "deny"
empty_structs_with_brackets = "deny"
float_cmp_const = "deny"
if_then_some_else_none = "deny"
same_name_method = "deny"
tests_outside_test_module = "deny"
unseparated_literal_suffix = "deny"
unwrap_used = "deny"

[workspace.dependencies]
anyhow = "1.0.102"
chrono = { version = "0.4.44", default-features = false, features = ["clock", "std", "serde"] }
clap = { version = "4.6.1", features = ["derive"] }
clap-verbosity-flag = "3.0.4"
comfy-table = "7.2.2"
console = "0.16.3"
detect-indent = "0.1.0"
globset = "0.4.18"
indicatif = "0.18.4"
log = "0.4.29"
regex = "1.12.3"
semver = "1.0.28"
serde = { version = "1.0.228", features = ["derive"] }
sort-package-json = "0.0.13"
serde_json = { version = "1.0.150", features = ["preserve_order"] }
serde_yml = "0.0.12"
tera = { version = "1.20.1", default-features = false }
tracing = "0.1.44"
tracing-log = "0.2.0"
thiserror = "2.0.18"
tracing-subscriber = "0.3.23"
ureq = { version = "3.3.0", default-features = false, features = ["rustls"] }

# napi
napi = { version = "3.9.0", default-features = false, features = ["napi6", "serde-json"] }
napi-derive = { version = "3.5.6", features = ["type-def"] }

# test infrastructure
criterion = { version = "0.8.2", features = ["html_reports"] }
insta = "1.47.2"
proptest = "1.11.0"
rstest = "0.26.1"
tempfile = "3.27.0"
walkdir = "2.5.0"

# workspace internal
riri-find-up = { path = "crates/riri-find-up" }
riri-common = { path = "crates/riri-common" }
riri-npm = { path = "crates/riri-npm" }
riri-pnpm = { path = "crates/riri-pnpm" }
riri-yarn = { path = "crates/riri-yarn" }
riri-bun = { path = "crates/riri-bun" }
riri-semver-range = { path = "crates/riri-semver-range" }
riri-nce = { path = "crates/riri-nce", default-features = false }
riri-napi-nce = { path = "crates/riri-napi-nce" }
riri-napi-npd = { path = "crates/riri-napi-npd" }
riri-node-lifecycle = { path = "crates/riri-node-lifecycle" }
riri-npd = { path = "crates/riri-npd" }
riri-task-runner = { path = "crates/riri-task-runner" }
riri-workspace = { path = "crates/riri-workspace" }
