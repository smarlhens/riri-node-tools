name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      bench: ${{ steps.filter.outputs.bench }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            bench:
              - "crates/**"
              - "Cargo.toml"
              - "Cargo.lock"
              - "fixtures/**"
              - "scripts/**"
              - "rustfmt.toml"
              - ".github/workflows/ci.yml"
              - ".github/workflows/bench-run.yml"

  prek:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: prek
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Run prek hooks
        uses: ./.github/actions/setup-prek

  rust:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Install Rust
        run: rustup toolchain install
      - name: Rust cache
        uses: Swatinem/rust-cache@v2 # zizmor: ignore[cache-poisoning] release-please-action ships no build artifacts
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Check errors
        run: cargo check --workspace
      - name: Lint
        run: cargo clippy --workspace --all-targets
      - name: Test
        run: cargo test --workspace --verbose
      - name: Set release-please variables
        env:
          HAS_RELEASE_COMMIT: "${{ contains(toJson(github.event.commits.*.message), 'chore: release main') }}"
        run: |
          if [ "$HAS_RELEASE_COMMIT" = "true" ]; then
            echo "skip_github_pull_request=true"  >> "$GITHUB_ENV"
            echo "skip_github_release=false"      >> "$GITHUB_ENV"
          else
            echo "skip_github_pull_request=false" >> "$GITHUB_ENV"
            echo "skip_github_release=true"       >> "$GITHUB_ENV"
          fi
      - name: Prepare release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          skip-github-pull-request: ${{ env.skip_github_pull_request }}
          skip-github-release: ${{ env.skip_github_release }}
          token: ${{ secrets.PAT }}

  bench-baseline:
    needs: changes
    if: needs.changes.outputs.bench == 'true'
    uses: ./.github/workflows/bench-run.yml
    with:
      ref: ${{ github.sha }}
      baseline-name: base
      artifact-name: criterion-base
      save-rust-cache: true
      rust-cache-prefix: bench-v1

  cache-baseline:
    needs: [changes, bench-baseline]
    if: needs.changes.outputs.bench == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Download criterion baselines
        uses: actions/download-artifact@v8
        with:
          name: criterion-base
          path: /tmp/bench-baseline/criterion

      - name: Save baseline metadata
        env:
          BINARY_SIZES: ${{ needs.bench-baseline.outputs.binary-sizes }}
          TEST_COUNT: ${{ needs.bench-baseline.outputs.test-count }}
          PEAK_RSS_KB: ${{ needs.bench-baseline.outputs.peak-rss-kb }}
        run: |
          printf '%s' "$BINARY_SIZES" > /tmp/bench-baseline/binary-sizes.json
          printf '%s' "$TEST_COUNT" > /tmp/bench-baseline/test-count.txt
          printf '%s' "$PEAK_RSS_KB" > /tmp/bench-baseline/peak-rss-kb.txt

      - name: Cache baseline results
        uses: actions/cache/save@v6
        with:
          path: /tmp/bench-baseline
          key: bench-baseline-${{ github.sha }}
