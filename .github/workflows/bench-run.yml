name: bench-run

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to benchmark
        required: true
        type: string
      baseline-name:
        description: Criterion baseline name
        required: true
        type: string
      artifact-name:
        description: Name for the uploaded artifact
        required: true
        type: string
      save-rust-cache:
        description: Whether to save the Rust build cache
        required: false
        type: boolean
        default: false
      rust-cache-prefix:
        description: Prefix key for the Rust cache
        required: false
        type: string
        default: bench-v1
    outputs:
      binary-sizes:
        description: JSON object of binary sizes in bytes
        value: ${{ jobs.bench.outputs.binary-sizes }}
      test-count:
        description: Number of tests
        value: ${{ jobs.bench.outputs.test-count }}
      peak-rss-kb:
        description: JSON object of peak RSS in KB per binary
        value: ${{ jobs.bench.outputs.peak-rss-kb }}

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    runs-on: ubuntu-24.04
    outputs:
      binary-sizes: ${{ steps.sizes.outputs.json }}
      test-count: ${{ steps.tests.outputs.count }}
      peak-rss-kb: ${{ steps.rss.outputs.rss_kb }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install Rust
        run: rustup update stable && rustup default stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ inputs.rust-cache-prefix }}
          save-if: ${{ inputs.save-rust-cache }}

      - name: Build release binaries
        run: |
          members=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[].name')
          for p in riri-nce riri-npd riri-ncd; do
            if echo "$members" | grep -qx "$p"; then
              cargo build --release -p "$p"
            else
              echo "skip $p (not in workspace at this ref)"
            fi
          done

      - name: Record binary sizes
        id: sizes
        run: |
          sizes="{}"
          for bin in nce npd ncd; do
            if [ -f "target/release/$bin" ]; then
              s=$(stat --format='%s' "target/release/$bin")
              sizes=$(echo "$sizes" | jq -c --arg k "$bin" --argjson v "$s" '. + {($k): $v}')
            fi
          done
          echo "json=$sizes" >> "$GITHUB_OUTPUT"

      - name: Count tests
        id: tests
        run: |
          count=$(cargo test --workspace -- --list 2>&1 | grep -c ': test$' || echo "0")
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Measure peak RSS
        id: rss
        run: |
          measure_in() {
            local fixture="$1"
            local binary="$2"
            if [ ! -d "$fixture" ] || [ ! -x "$binary" ]; then
              echo "0"
              return
            fi
            (cd "$fixture" && { /usr/bin/time -v "../../$binary" --quiet 2>&1 1>/dev/null; } 2>&1 \
              | grep 'Maximum resident set size' | grep -oP '\d+' || echo "0")
          }
          # ncd needs a registry; synthesize an offline one (one empty packument
          # per locked package) so the run is deterministic, then measure it
          # against the shared 500-dep lockfile for a comparable workload.
          measure_ncd() {
            local fixture="$1"
            local binary="$2"
            if [ ! -d "$fixture" ] || [ ! -x "$binary" ]; then
              echo "0"
              return
            fi
            local root reg
            root="$PWD"
            reg="$(mktemp -d)"
            jq -r '.packages | keys[] | select(startswith("node_modules/")) | ltrimstr("node_modules/")' \
              "$fixture/package-lock.json" | while read -r name; do
              printf '{}' > "$reg/$name.json"
            done
            (cd "$fixture" && { /usr/bin/time -v "$root/$binary" --quiet --registry "file://$reg" 2>&1 1>/dev/null; } 2>&1 \
              | grep 'Maximum resident set size' | grep -oP '\d+' || echo "0")
          }
          rss_nce=$(measure_in fixtures/npm-v3-500-deps target/release/nce)
          rss_npd=$(measure_in fixtures/npd-npm-v3-500-deps target/release/npd)
          rss_ncd=$(measure_ncd fixtures/npd-npm-v3-500-deps target/release/ncd)
          json=$(jq -nc --argjson nce "$rss_nce" --argjson npd "$rss_npd" --argjson ncd "$rss_ncd" \
            '{"nce": $nce, "npd": $npd, "ncd": $ncd}')
          echo "rss_kb=$json" >> "$GITHUB_OUTPUT"

      - name: Discover bench targets
        id: discover
        run: |
          targets=$(grep -r '^\[\[bench\]\]' crates/*/Cargo.toml -A1 \
            | grep 'name =' | sed 's/.*name = "\(.*\)"/--bench \1/' | tr '\n' ' ')
          echo "targets=$targets" >> "$GITHUB_OUTPUT"
          echo "Discovered bench targets: $targets"

      - name: Run benchmarks
        env:
          BENCH_TARGETS: ${{ steps.discover.outputs.targets }}
          BASELINE_NAME: ${{ inputs.baseline-name }}
        run: |
          read -ra targets <<< "$BENCH_TARGETS"
          cargo bench "${targets[@]}" -- --save-baseline "$BASELINE_NAME"

      - name: Upload criterion baselines
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: target/criterion
          retention-days: 1
