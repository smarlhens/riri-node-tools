name: bench-run

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to benchmark
        required: true
        type: string
      baseline-name:
        description: Criterion baseline name
        required: true
        type: string
      artifact-name:
        description: Name for the uploaded artifact
        required: true
        type: string
      save-rust-cache:
        description: Whether to save the Rust build cache
        required: false
        type: boolean
        default: false
      rust-cache-prefix:
        description: Prefix key for the Rust cache
        required: false
        type: string
        default: bench-v1
      crates:
        description: Space-separated benchable crates to run (nce ncd npd semver-range). Empty runs all.
        required: false
        type: string
        default: ""
    outputs:
      binary-sizes:
        description: JSON object of binary sizes in bytes
        value: ${{ jobs.bench.outputs.binary-sizes }}
      test-count:
        description: Number of tests
        value: ${{ jobs.bench.outputs.test-count }}
      peak-rss-kb:
        description: JSON object of peak RSS in KB per binary
        value: ${{ jobs.bench.outputs.peak-rss-kb }}

env:
  CARGO_TERM_COLOR: always

jobs:
  bench:
    runs-on: ubuntu-24.04
    outputs:
      binary-sizes: ${{ steps.bench.outputs.binary-sizes }}
      test-count: ${{ steps.bench.outputs.test-count }}
      peak-rss-kb: ${{ steps.bench.outputs.peak-rss-kb }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: Install Rust
        run: rustup update stable && rustup default stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ inputs.rust-cache-prefix }}
          save-if: ${{ inputs.save-rust-cache }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: bench-js/.nvmrc

      # Builds binaries, records sizes, counts tests, measures peak RSS and runs
      # the criterion benches for the crate set; emits binary-sizes / test-count
      # / peak-rss-kb. Logic lives in bench-js/lib/ci-bench.ts (unit-tested).
      - name: Benchmark
        id: bench
        env:
          CRATES: ${{ inputs.crates }}
          BASELINE_NAME: ${{ inputs.baseline-name }}
        run: node bench-js/ci-bench.ts

      - name: Upload criterion baselines
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: target/criterion
          retention-days: 1
